<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIT Hostel Complaint System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">
    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-logo">
                <div class="logo-icon"><img src="https://akshiittt.github.io/VIT-hostel-complaint-system/images/c6c2e9022f25f404fe108a4cfefab222.jpg" alt="VIT Logo" style="width: 100px; height: 100px;"></div>
                <h1>VIT Hostel</h1>
                <p class="login-subtitle">Complaint & Request System</p>
            </div>

            <div class="login-form">
                <div class="form-group">
                    <label for="loginName">Full Name</label>
                    <input type="text" id="loginName" placeholder="Enter your full name">
                </div>
                <div class="form-group">
                    <label for="loginId">Registration No. / Staff ID</label>
                    <input type="text" id="loginId" placeholder="e.g. 23BCE1234 or STAFF001">
                </div>
                <p id="loginError" class="error-msg" style="display:none;">Please fill in both fields.</p>
                <div class="login-buttons">
                    <button class="btn btn-student" id="studentBtn">Login as Student</button>
                    <button class="btn btn-warden" id="wardenBtn">Login as Warden</button>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
