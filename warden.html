<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warden Panel – VIT Hostel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dashboard-body">
    <header class="topbar">
        <div class="topbar-left">
            <img src="images/c6c2e9022f25f404fe108a4cfefab222.jpg" alt="VIT Logo" style="width: 32px; height: 32px;">
            <span class="topbar-title">VIT Hostel Complaint System</span>
        </div>
        <div class="topbar-right">
            <span class="role-badge warden-badge">Warden</span>
            <a href="login.html" class="logout-link">Logout</a>
        </div>
    </header>

    <div class="warden-container">
        <div class="warden-top">
            <h2 class="panel-heading">All Complaints</h2>
            <div class="stats-row">
                <div class="stat-box">
                    <span id="totalCount">0</span>
                    <small>Total</small>
                </div>
                <div class="stat-box pending-stat">
                    <span id="pendingCount">0</span>
                    <small>Pending</small>
                </div>
                <div class="stat-box done-stat">
                    <span id="doneCount">0</span>
                    <small>Completed</small>
                </div>
            </div>
        </div>

        <div id="wardenComplaintList">
            <p class="empty-msg">No complaints found. Students haven't submitted any yet.</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
